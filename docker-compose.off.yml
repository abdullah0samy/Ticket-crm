services:
  app:
    build: .
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - DATABASE_URL=postgresql://johndoe:c3fd17a5eb730219e324f8a6556c678baaf41b176f5ddee1790ab9299e043613@db:5432/abch_db?schema=public&connection_limit=20&pool_timeout=30&connect_timeout=10
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=da7170c2230eb55275bf0cd1af41b04d190bcde3ab21a2c3bad4dfff8d7f5130
      - JWT_REFRESH_SECRET=1f8476ac224859e20ebaaaa23badd84393426bac2d92a408807938f06f8677cd
      - NODE_ENV=production
      - FRONTEND_URL=https://ticket.abchospitaleg.com
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3007/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=johndoe
      - POSTGRES_PASSWORD=c3fd17a5eb730219e324f8a6556c678baaf41b176f5ddee1790ab9299e043613
      - POSTGRES_DB=abch_db
    ports:
      - "5445:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U johndoe -d abch_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "9396:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
  uploads_data:
